name: Video Pulse — YouTube Check

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  check-videos:
    runs-on: ubuntu-latest
    steps:
      - name: YouTube RSS prüfen & neue Videos in Supabase eintragen
        env:
          SUPABASE_URL: https://rjmyjuejdhcnijerwwwe.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          import xml.etree.ElementTree as ET

          URL  = os.environ['SUPABASE_URL']
          KEY  = os.environ['SUPABASE_SERVICE_ROLE_KEY']
          HDR  = {'apikey': KEY, 'Authorization': f'Bearer {KEY}', 'Content-Type': 'application/json'}

          CHANNELS = [
            ('UCv90NdTyTp7ZPPRvvSZaS5w', 'Digitale Profis'),
            ('UCDx6L69jmKBJbNu5GnkCilg', 'Christoph Magnussen'),
          ]

          NS = {
            'atom': 'http://www.w3.org/2005/Atom',
            'yt':   'http://www.youtube.com/xml/schemas/2015',
          }

          def fetch(url, data=None, method=None):
            req = urllib.request.Request(
              url, data=data, headers=HDR,
              method=method or ('POST' if data else 'GET')
            )
            with urllib.request.urlopen(req, timeout=15) as r:
              return r.read()

          def existing_ids():
            raw = fetch(f'{URL}/rest/v1/videos?select=video_id')
            return {v['video_id'] for v in json.loads(raw)}

          known = existing_ids()
          added = 0

          for channel_id, channel_name in CHANNELS:
            rss_url = f'https://www.youtube.com/feeds/videos.xml?channel_id={channel_id}'
            try:
              req = urllib.request.Request(rss_url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=15) as r:
                root = ET.fromstring(r.read())
            except Exception as e:
              print(f'RSS-Fehler {channel_name}: {e}')
              continue

            entries = root.findall('atom:entry', NS)
            print(f'[{channel_name}] {len(entries)} Einträge im RSS')
            for entry in entries:
              vid   = entry.find('yt:videoId', NS).text
              title = entry.find('atom:title',    NS).text
              pub   = entry.find('atom:published', NS).text
              if vid in known:
                continue
              payload = json.dumps({
                'channel_id':   channel_id,
                'channel_name': channel_name,
                'video_id':     vid,
                'title':        title,
                'published_at': pub,
              }).encode()
              try:
                fetch(f'{URL}/rest/v1/videos', data=payload)
                known.add(vid)
                added += 1
                print(f'+ {channel_name}: {title}')
              except Exception as e:
                print(f'Insert-Fehler {vid}: {e}')

          print(f'\nFertig — {added} neues Video(s) eingetragen.')
          PYEOF
